<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M.Y 靈感收納箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 配置 (環境會自動注入 Key)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pocketly-app';

        // 狀態管理
        window.appState = {
            user: null,
            categories: [
                { id: 'all', name: '全部靈感', emoji: '🌟', sortOrder: 0 },
                { id: 'life', name: '生活靈感', emoji: '💡', sortOrder: 1 },
                { id: 'recipe', name: '食譜料理', emoji: '🍳', sortOrder: 2 },
                { id: 'parenting', name: '育兒親子', emoji: '👶🏻', sortOrder: 3 }
            ],
            items: [],
            activeTab: 'all',
            isEditing: false
        };

        // 初始化 Auth
        const initAuth = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.appState.user = user;
                    setupListeners();
                }
            });
        };

        // 監聽雲端數據
        const setupListeners = () => {
            const userId = auth.currentUser.uid;
            
            // 監聽分類
            onSnapshot(doc(db, 'artifacts', appId, 'users', userId, 'config', 'categories'), (docSnap) => {
                if (docSnap.exists()) {
                    window.appState.categories = docSnap.data().list;
                    renderTabs();
                    renderEditList();
                } else {
                    saveCategories(); // 首次保存默認值
                }
            }, (err) => console.error(err));

            // 監聽項目
            onSnapshot(collection(db, 'artifacts', appId, 'users', userId, 'items'), (querySnap) => {
                const items = [];
                querySnap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                window.appState.items = items;
                renderItems();
            });
        };

        // 保存分類到雲端
        const saveCategories = async () => {
            if (!auth.currentUser) return;
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'config', 'categories'), {
                list: window.appState.categories
            });
        };

        // 保存項目到雲端
        window.addItem = async (item) => {
            if (!auth.currentUser) return;
            const id = Date.now().toString();
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'items', id), {
                ...item,
                createdAt: new Date().toISOString()
            });
        };

        window.deleteItem = async (id) => {
            if (!auth.currentUser) return;
            // 簡化刪除：這裡直接重新覆蓋或調用 deleteDoc
            const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'items', id));
        };

        // UI 渲染函數
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = window.appState.categories.map(cat => `
                <button onclick="window.setTab('${cat.id}')" 
                    class="flex-shrink-0 px-4 py-2 rounded-full border transition-all duration-300 ${window.appState.activeTab === cat.id ? 'bg-[#A67B5B] text-white border-[#A67B5B]' : 'bg-white text-[#6F4E37] border-[#D2B48C] hover:bg-[#F5F5DC]'}">
                    <span>${cat.emoji}</span> <span class="ml-1">${cat.name}</span>
                </button>
            `).join('');
        }

        function renderItems() {
            const container = document.getElementById('items-grid');
            const filtered = window.appState.activeTab === 'all' 
                ? window.appState.items 
                : window.appState.items.filter(i => i.categoryId === window.appState.activeTab);
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="text-5xl mb-4 opacity-30">📦</div>
                        <p class="text-[#8B7355]">這裡還空空的，點擊右下角新增靈感吧！</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-2xl shadow-sm border border-[#F5EBE0] overflow-hidden flex flex-col group relative">
                    <button onclick="window.deleteItem('${item.id}')" class="absolute top-2 right-2 p-2 bg-red-50 text-red-400 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-trash-alt text-sm"></i>
                    </button>
                    <div class="h-4 w-full bg-[#FAF7F2] flex items-center px-4 space-x-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-[#E6D5C3]"></div>
                    </div>
                    <div class="p-5 flex-1">
                        <span class="inline-block px-2 py-0.5 rounded bg-[#FDFBF7] border border-[#F5EBE0] text-[10px] text-[#A67B5B] mb-3">
                            ${window.appState.categories.find(c => c.id === item.categoryId)?.emoji || '🔖'} 
                            ${window.appState.categories.find(c => c.id === item.categoryId)?.name || '未分類'}
                        </span>
                        <h3 class="text-[#4A3728] font-bold text-lg mb-2 leading-tight">${item.title}</h3>
                        <p class="text-[#8B7355] text-sm leading-relaxed mb-4">${item.note}</p>
                        <a href="${item.url}" target="_blank" class="block w-full py-2 text-center rounded-xl bg-[#FDFBF7] border border-[#F5EBE0] text-[#A67B5B] text-sm hover:bg-[#F5EBE0] transition-colors">
                            <i class="fas fa-link mr-1"></i> 前往原文
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // 管理面板相關
        window.toggleSettings = () => {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            renderEditList();
        };

        function renderEditList() {
            const list = document.getElementById('edit-category-list');
            list.innerHTML = window.appState.categories.map((cat, index) => `
                <div class="flex items-center space-x-2 bg-[#FAF7F2] p-3 rounded-xl border border-[#F5EBE0]">
                    <span class="cursor-move text-[#D2B48C]"><i class="fas fa-grip-vertical"></i></span>
                    <input type="text" value="${cat.emoji}" onchange="window.updateCat(${index}, 'emoji', this.value)" class="w-10 p-1 text-center bg-transparent border-b border-[#D2B48C]">
                    <input type="text" value="${cat.name}" onchange="window.updateCat(${index}, 'name', this.value)" class="flex-1 p-1 bg-transparent border-b border-[#D2B48C] text-[#4A3728]">
                    ${index > 0 ? `<button onclick="window.removeCat(${index})" class="text-red-400 p-1"><i class="fas fa-times"></i></button>` : '<div class="w-7"></div>'}
                </div>
            `).join('');
        }

        window.updateCat = (index, key, val) => {
            window.appState.categories[index][key] = val;
            saveCategories();
        };

        window.addCat = () => {
            window.appState.categories.push({ id: 'new-' + Date.now(), name: '新分類', emoji: '📂', sortOrder: window.appState.categories.length });
            saveCategories();
        };

        window.removeCat = (index) => {
            window.appState.categories.splice(index, 1);
            saveCategories();
        };

        window.setTab = (id) => {
            window.appState.activeTab = id;
            renderTabs();
            renderItems();
        };

        window.showAddModal = () => document.getElementById('add-modal').classList.remove('hidden');
        window.hideAddModal = () => document.getElementById('add-modal').classList.add('hidden');

        window.submitAdd = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await window.addItem({
                title: formData.get('title'),
                url: formData.get('url'),
                note: formData.get('note'),
                categoryId: formData.get('categoryId')
            });
            e.target.reset();
            hideAddModal();
        };

        // 初始載入
        window.onload = () => {
            initAuth();
            const select = document.querySelector('select[name="categoryId"]');
            const updateSelect = () => {
                select.innerHTML = window.appState.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
            };
            // 監控 categories 變化來更新 select
            const originalRenderTabs = renderTabs;
            renderTabs = () => {
                originalRenderTabs();
                updateSelect();
            };
        };

    </script>
    <style>
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-header { backdrop-filter: blur(10px); background: rgba(253, 251, 247, 0.85); }
    </style>
</head>
<body class="text-[#4A3728]">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-40 border-b border-[#F5EBE0] px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center space-x-2">
                <span class="text-2xl">☕</span>
                <span>M.Y 靈感收納箱</span>
            </h1>
            <div class="flex space-x-2">
                <button onclick="window.toggleSettings()" class="w-10 h-10 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 pb-24">
        <!-- Search & Tabs -->
        <div class="mb-8">
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#D2B48C]"></i>
                <input type="text" placeholder="搜尋標題、標籤或內容..." class="w-full pl-12 pr-4 py-3 bg-white border border-[#F5EBE0] rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#D2B48C] transition-all">
            </div>

            <div id="tabs-container" class="flex space-x-2 overflow-x-auto no-scrollbar pb-2">
                <!-- Tabs rendered by JS -->
            </div>
        </div>

        <!-- Items Grid -->
        <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-pulse text-[#D2B48C]">載入靈感中...</div>
            </div>
        </div>
    </main>

    <!-- Floating Add Button -->
    <button onclick="window.showAddModal()" class="fixed bottom-8 right-6 w-14 h-14 bg-[#A67B5B] text-white rounded-full shadow-lg flex items-center justify-center text-2xl z-50 hover:scale-105 active:scale-95 transition-transform safe-bottom">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <span class="mr-2">📝</span> 新增靈感
            </h2>
            <form onsubmit="window.submitAdd(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-[#8B7355] mb-1 ml-1 uppercase">標題</label>
                    <input name="title" required type="text" placeholder="例如：超夢幻杯子蛋糕食譜" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none focus:border-[#D2B48C]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#8B7355] mb-1 ml-1 uppercase">原文網址</label>
                    <input name="url" required type="url" placeholder="貼上 IG 或 Threads 連結" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none focus:border-[#D2B48C]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#8B7355] mb-1 ml-1 uppercase">分類</label>
                    <select name="categoryId" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none focus:border-[#D2B48C]">
                        <!-- Options by JS -->
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#8B7355] mb-1 ml-1 uppercase">筆記</label>
                    <textarea name="note" rows="3" placeholder="寫下為什麼想收藏它..." class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none focus:border-[#D2B48C]"></textarea>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="window.hideAddModal()" class="flex-1 py-3 text-[#A67B5B] font-bold border border-[#F5EBE0] rounded-xl">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-[#A67B5B] text-white font-bold rounded-xl shadow-md">儲存靈感</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal (Management) -->
    <div id="settings-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-[#4A3728]">管理分類</h2>
                <button onclick="window.addCat()" class="text-sm px-3 py-1 bg-[#F5EBE0] text-[#A67B5B] rounded-lg font-bold">+ 新增</button>
            </div>
            <div id="edit-category-list" class="space-y-3 max-h-96 overflow-y-auto mb-6">
                <!-- List by JS -->
            </div>
            <button onclick="window.toggleSettings()" class="w-full py-3 bg-[#A67B5B] text-white font-bold rounded-xl">完成</button>
        </div>
    </div>

</body>
</html>
