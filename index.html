<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M.Y 靈感收納箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --milk: #fdf8f3; --cream: #f5ece0; --latte: #e8d5bc;
            --caramel: #c9a97a; --brown: #8b6343; --text: #3d2b1a;
            --white: #fffefb; --shadow: rgba(139, 99, 67, 0.1);
        }
        body { background-color: var(--milk); color: var(--text); font-family: -apple-system, "Noto Sans TC", sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-header { backdrop-filter: blur(15px); background: rgba(253, 248, 243, 0.85); }
        
        /* 卡片與清單樣式 */
        .card-style { background: var(--white); border-radius: 20px; border: 1px solid var(--cream); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px var(--shadow); }
        .list-style { background: var(--white); border-radius: 16px; border: 1px solid var(--cream); display: flex; align-items: center; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px var(--shadow); }
        
        /* 拖曳動畫 */
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .draggable-item { cursor: grab; }
        .draggable-item:active { cursor: grabbing; }

        .btn-primary { background-color: var(--brown); color: white; border-radius: 14px; }
        .tab-active { background-color: var(--brown) !important; color: white !important; border-color: var(--brown) !important; }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--milk); border: 1px solid var(--cream); color: var(--brown); }
        
        /* 模擬 Loading */
        .loader { width: 20px; height: 20px; border: 2px solid var(--cream); border-top: 2px solid var(--brown); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-40 border-b border-[#F5EBE0] px-4 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🧸</span>
                <h1 class="text-lg font-bold tracking-tight">M.Y 靈感收納箱</h1>
            </div>
            <div class="flex space-x-3">
                <button onclick="toggleView()" class="w-9 h-9 rounded-full bg-white border border-cream text-brown flex items-center justify-center shadow-sm">
                    <i id="viewIcon" class="fas fa-th-large"></i>
                </button>
                <button onclick="openSync()" class="w-9 h-9 rounded-full bg-white border border-cream text-brown flex items-center justify-center shadow-sm">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button onclick="openSettings()" class="w-9 h-9 rounded-full bg-white border border-cream text-brown flex items-center justify-center shadow-sm">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Search -->
        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-caramel opacity-60"></i>
            <input type="text" id="searchInput" oninput="renderItems()" placeholder="搜尋靈感內容、#標籤..." 
                class="w-full pl-11 pr-4 py-3.5 bg-white border border-cream rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-latte/50">
        </div>

        <!-- Categories (Draggable) -->
        <div id="tabsContainer" class="flex space-x-2 overflow-x-auto no-scrollbar pb-4">
            <!-- JS Render -->
        </div>

        <!-- Grid/List Container -->
        <div id="itemsContainer" class="grid grid-cols-2 gap-3 md:gap-5">
            <!-- JS Render -->
        </div>
    </main>

    <!-- Floating Add -->
    <button onclick="showAdd()" class="fixed bottom-10 right-6 w-14 h-14 btn-primary shadow-lg flex items-center justify-center text-xl z-50">
        <i class="fas fa-feather-alt"></i>
    </button>

    <!-- Modal: 新增靈感 -->
    <div id="addModal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/40 hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-lg rounded-[32px] p-6 shadow-2xl overflow-y-auto max-h-[85vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">✨ 捕捉新靈感</h2>
                <button onclick="hideAdd()" class="text-gray-300"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <form onsubmit="saveNewItem(event)" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-brown ml-1 uppercase opacity-60">連結 (自動抓取)</label>
                    <div class="relative">
                        <input name="url" id="urlInput" onblur="autoFetch(this.value)" type="url" placeholder="貼上 IG 或 Threads 連結" class="w-full px-4 py-3.5 bg-milk border border-cream rounded-2xl focus:outline-none focus:border-caramel transition-colors">
                        <div id="urlLoader" class="absolute right-4 top-1/2 -translate-y-1/2 hidden"><div class="loader"></div></div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-brown ml-1 uppercase opacity-60">封面預覽</label>
                    <div id="dropZone" onclick="document.getElementById('fileInput').click()" class="w-full h-36 border-2 border-dashed border-cream rounded-2xl bg-milk flex items-center justify-center cursor-pointer overflow-hidden relative">
                        <div id="previewText" class="text-caramel text-sm flex flex-col items-center"><i class="fas fa-cloud-upload-alt text-2xl mb-2"></i>點擊或貼上圖片</div>
                        <img id="imagePreview" class="hidden h-full w-full object-cover">
                        <button type="button" id="clearImgBtn" onclick="clearImage(event)" class="hidden absolute top-2 right-2 w-7 h-7 bg-white/80 rounded-full text-xs text-red-400 border border-red-50">✕</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this.files[0])">
                    <input type="hidden" name="imageData" id="imageData">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-brown ml-1 uppercase opacity-60">標題與筆記</label>
                    <input name="title" id="titleInput" required placeholder="給這個靈感一個標題" class="w-full px-4 py-3.5 bg-milk border border-cream rounded-2xl mb-2 focus:outline-none">
                    <textarea name="note" id="noteInput" rows="2" placeholder="寫點什麼筆記..." class="w-full px-4 py-3.5 bg-milk border border-cream rounded-2xl focus:outline-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-brown ml-1 uppercase opacity-60">存放位置</label>
                        <select name="categoryId" id="catSelect" class="w-full px-3 py-3.5 bg-milk border border-cream rounded-2xl focus:outline-none"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-brown ml-1 uppercase opacity-60 flex justify-between">
                            標籤 <span onclick="autoTags()" class="cursor-pointer text-blue-400">✨ AI 幫貼</span>
                        </label>
                        <input name="tags" id="tagsInput" placeholder="美食, 探店" class="w-full px-3 py-3.5 bg-milk border border-cream rounded-2xl focus:outline-none text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full py-4 btn-primary font-bold shadow-lg mt-4 text-lg">確認收藏</button>
            </form>
        </div>
    </div>

    <!-- Modal: 代號同步 -->
    <div id="syncModal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/40 hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-milk rounded-full flex items-center justify-center mx-auto mb-4 border border-cream text-caramel text-2xl">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">專屬同步代號</h2>
            <p class="text-xs text-brown opacity-60 mb-6 leading-relaxed">設定一個妳記得住的代號（例如：MY2024），<br>在任何裝置輸入此代號即可登入同步。</p>
            
            <input type="text" id="syncIdInput" placeholder="輸入妳的專屬代號" class="w-full px-4 py-4 bg-milk border border-cream rounded-2xl mb-4 text-center font-bold tracking-widest uppercase focus:outline-none focus:border-brown transition-all">
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="handleSync('save')" class="py-3.5 btn-primary text-sm font-bold shadow-md">保存至雲端</button>
                <button onclick="handleSync('load')" class="py-3.5 bg-milk text-brown border border-cream rounded-xl text-sm font-bold">載入同步</button>
            </div>
            <button onclick="closeSync()" class="mt-6 text-xs text-gray-400 font-medium underline underline-offset-4">暫不設定</button>
        </div>
    </div>

    <!-- Modal: 管理與拖曳排序 -->
    <div id="settingsModal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/40 hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">自訂分類排序</h2>
                <button onclick="addCategory()" class="text-sm font-bold text-brown">+ 新增</button>
            </div>
            <p class="text-[10px] text-gray-400 mb-4 italic"><i class="fas fa-info-circle mr-1"></i>小技巧：直接上下拖曳分類即可調整順序喔！</p>
            <div id="settingsList" class="space-y-2 max-h-80 overflow-y-auto pr-1">
                <!-- JS Render Sortable -->
            </div>
            <button onclick="closeSettings()" class="w-full py-4 btn-primary font-bold mt-6 shadow-lg">儲存順序</button>
        </div>
    </div>

    <script>
        let state = {
            viewMode: 'grid', // grid or list
            categories: [
                { id: 'all', name: '全部靈感', emoji: '🌟' },
                { id: 'handmade', name: '手作靈感', emoji: '🎨' },
                { id: 'travel', name: '旅遊相關', emoji: '✈️' },
                { id: 'recommend', name: '推薦小物', emoji: '🛒' },
                { id: 'book', name: '書籍收藏', emoji: '📚' },
                { id: 'foodmap', name: '美食地圖', emoji: '📍' }
            ],
            items: [],
            activeTab: 'all'
        };

        const STORAGE_KEY = 'my_insp_v4';

        function load() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) state = JSON.parse(data);
            renderAll();
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            renderAll();
        }

        function renderAll() {
            renderTabs();
            renderItems();
            updateSelect();
        }

        // 佈局切換
        function toggleView() {
            state.viewMode = state.viewMode === 'grid' ? 'list' : 'grid';
            document.getElementById('viewIcon').className = state.viewMode === 'grid' ? 'fas fa-th-large' : 'fas fa-list';
            save();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = state.categories.map(cat => `
                <button onclick="setTab('${cat.id}')" 
                    class="flex-shrink-0 px-5 py-2.5 rounded-full border transition-all text-sm whitespace-nowrap ${state.activeTab === cat.id ? 'tab-active shadow-md' : 'bg-white text-brown border-cream'}">
                    <span>${cat.emoji}</span> <span class="ml-1 font-medium">${cat.name}</span>
                </button>
            `).join('');
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = state.activeTab === 'all' ? state.items : state.items.filter(i => i.categoryId === state.activeTab);
            
            if (search) {
                filtered = filtered.filter(i => 
                    i.title.toLowerCase().includes(search) || 
                    i.note.toLowerCase().includes(search) || 
                    (i.tags && i.tags.toLowerCase().includes(search))
                );
            }

            if (state.viewMode === 'grid') {
                container.className = "grid grid-cols-2 gap-3 md:gap-5";
                container.innerHTML = filtered.map(item => `
                    <div class="card-style overflow-hidden flex flex-col relative group">
                        <button onclick="deleteItem('${item.id}')" class="absolute top-2 right-2 w-6 h-6 bg-white/90 rounded-full text-red-300 text-[10px] flex items-center justify-center z-10 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-trash"></i></button>
                        <div class="aspect-square bg-milk flex items-center justify-center overflow-hidden">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<i class="far fa-image text-3xl text-latte"></i>`}
                        </div>
                        <div class="p-3 flex-1 flex flex-col">
                            <h3 class="text-xs font-bold text-text mb-1 line-clamp-2 leading-snug">${item.title}</h3>
                            <div class="flex flex-wrap gap-1 mb-2">
                                ${(item.tags || '').split(',').filter(t => t.trim()).map(t => `<span class="tag">#${t.trim()}</span>`).join('')}
                            </div>
                            <a href="${item.url}" target="_blank" class="mt-auto block w-full py-1.5 text-center rounded-lg bg-milk border border-cream text-brown text-[10px] font-bold">查看原文</a>
                        </div>
                    </div>`).join('');
            } else {
                container.className = "flex flex-col space-y-2";
                container.innerHTML = filtered.map(item => `
                    <div class="list-style group">
                        <div class="w-14 h-14 rounded-xl bg-milk flex-shrink-0 mr-4 overflow-hidden border border-cream">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<i class="far fa-image text-latte flex items-center justify-center h-full"></i>`}
                        </div>
                        <div class="flex-1 min-w-0 pr-2">
                            <h3 class="text-sm font-bold text-text truncate mb-1">${item.title}</h3>
                            <div class="flex gap-2">
                                <span class="text-[10px] text-brown/60 truncate">${item.note || '無筆記'}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <a href="${item.url}" target="_blank" class="w-8 h-8 rounded-full bg-milk border border-cream flex items-center justify-center text-brown text-xs"><i class="fas fa-link"></i></a>
                            <button onclick="deleteItem('${item.id}')" class="w-8 h-8 rounded-full bg-red-50 text-red-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`).join('');
            }
        }

        // 自動資訊抓取 (模擬)
        function autoFetch(url) {
            if(!url) return;
            const loader = document.getElementById('urlLoader');
            loader.classList.remove('hidden');
            setTimeout(() => {
                const domain = new URL(url).hostname.split('.')[1] || 'Web';
                document.getElementById('titleInput').value = `${domain.toUpperCase()} 的精彩分享`;
                loader.classList.add('hidden');
            }, 800);
        }

        // AI 標籤 (模擬)
        function autoTags() {
            const title = document.getElementById('titleInput').value;
            const mapping = { '食譜': '料理, 晚餐', '手作': 'DIY, 創意', '旅遊': '景點, 拍照', '育兒': '寶寶, 親子' };
            let result = "生活";
            for(let k in mapping) if(title.includes(k)) result = mapping[k];
            document.getElementById('tagsInput').value = result;
        }

        // 圖片處理
        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('imageData').value = e.target.result;
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('previewText').classList.add('hidden');
                document.getElementById('clearImgBtn').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearImage(e) {
            e.stopPropagation();
            document.getElementById('imageData').value = '';
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('previewText').classList.remove('hidden');
            document.getElementById('clearImgBtn').classList.add('hidden');
        }

        // 監聽貼上
        document.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) handleFile(items[i].getAsFile());
            }
        });

        // 拖曳排序邏輯 (使用原生 DragDrop)
        let draggedIdx = null;
        function renderSettings() {
            const list = document.getElementById('settingsList');
            list.innerHTML = state.categories.map((cat, idx) => `
                <div draggable="true" ondragstart="dragStart(${idx})" ondragover="dragOver(event, ${idx})" ondragend="dragEnd()"
                    class="draggable-item flex items-center space-x-3 bg-milk p-4 rounded-2xl border border-cream transition-all hover:border-latte ${cat.id === 'all' ? 'opacity-50 pointer-events-none' : ''}">
                    <i class="fas fa-bars text-latte text-xs"></i>
                    <span class="text-sm">${cat.emoji}</span>
                    <input type="text" value="${cat.name}" onchange="updateCat(${idx}, 'name', this.value)" class="flex-1 bg-transparent border-none text-sm font-medium focus:ring-0">
                    <button onclick="removeCat(${idx})" class="text-red-200 hover:text-red-400"><i class="fas fa-minus-circle"></i></button>
                </div>
            `).join('');
        }

        window.dragStart = (idx) => { draggedIdx = idx; event.target.classList.add('dragging'); };
        window.dragEnd = () => { draggedIdx = null; document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('dragging')); };
        window.dragOver = (e, idx) => {
            e.preventDefault();
            if (draggedIdx === idx || state.categories[idx].id === 'all') return;
            const arr = [...state.categories];
            const draggedItem = arr.splice(draggedIdx, 1)[0];
            arr.splice(idx, 0, draggedItem);
            state.categories = arr;
            draggedIdx = idx;
            renderSettings();
        };

        // 代號同步邏輯 (模擬雲端)
        function handleSync(mode) {
            const id = document.getElementById('syncIdInput').value.trim().toUpperCase();
            if (!id) return alert('請先輸入代號喔！');
            
            if (mode === 'save') {
                const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
                localStorage.setItem(`cloud_sync_${id}`, encoded);
                alert(`資料已成功綁定至代號 [${id}]\n妳可以在其他裝置輸入此代號載入資料。`);
            } else {
                const remoteData = localStorage.getItem(`cloud_sync_${id}`);
                if (remoteData) {
                    if (confirm(`找到代號 [${id}] 的資料，是否要載入並覆蓋此裝置內容？`)) {
                        state = JSON.parse(decodeURIComponent(escape(atob(remoteData))));
                        save();
                        location.reload();
                    }
                } else {
                    alert('找不到這個代號的資料喔，請確認代號是否正確。');
                }
            }
        }

        // 基礎功能
        window.setTab = (id) => { state.activeTab = id; renderAll(); };
        window.showAdd = () => document.getElementById('addModal').classList.remove('hidden');
        window.hideAdd = () => { document.getElementById('addModal').classList.add('hidden'); };
        window.saveNewItem = (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            state.items.unshift({ id: Date.now().toString(), title: fd.get('title'), url: fd.get('url'), categoryId: fd.get('categoryId'), note: fd.get('note'), image: fd.get('imageData'), tags: fd.get('tags') });
            save(); e.target.reset(); clearImage(e); hideAdd();
        };
        window.deleteItem = (id) => { if(confirm('要刪除這份靈感嗎？')) { state.items = state.items.filter(i => i.id !== id); save(); } };
        window.openSettings = () => { document.getElementById('settingsModal').classList.remove('hidden'); renderSettings(); };
        window.closeSettings = () => { save(); document.getElementById('settingsModal').classList.add('hidden'); };
        window.addCategory = () => { state.categories.push({ id: 'c'+Date.now(), name: '新分類', emoji: '📂' }); renderSettings(); };
        window.removeCat = (idx) => { state.categories.splice(idx, 1); renderSettings(); };
        window.updateCat = (idx, k, v) => { state.categories[idx][k] = v; };
        window.openSync = () => document.getElementById('syncModal').classList.remove('hidden');
        window.closeSync = () => document.getElementById('syncModal').classList.add('hidden');
        function updateSelect() {
            document.getElementById('catSelect').innerHTML = state.categories.filter(c => c.id !== 'all').map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
        }

        load();
    </script>
</body>
</html>
