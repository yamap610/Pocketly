<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M.Y 靈感收納箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --cream: #FFFDD0; --latte: #D2B48C; --cocoa: #6F4E37; --bg: #FDFBF7; }
        body { background-color: var(--bg); font-family: -apple-system, "Noto Sans TC", sans-serif; color: var(--cocoa); -webkit-tap-highlight-color: transparent; }
        .glass-header { backdrop-filter: blur(12px); background: rgba(253, 251, 247, 0.9); }
        .card-shadow { box-shadow: 0 8px 24px rgba(210, 180, 140, 0.12); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .masonry-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

        .tab-btn {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 99px;
            border: 1px solid #D2B48C;
            background: white;
            white-space: nowrap;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #A67B5B;
            color: white;
            border-color: #A67B5B;
        }

        .quote-bg::before {
            content: "\f10d";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 15px; left: 20px;
            font-size: 3rem;
            color: var(--latte);
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }
        
        .tag-pill {
            background: #F5EBE0;
            color: #A67B5B;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            margin-right: 6px;
            margin-top: 6px;
            display: inline-block;
        }

        .drag-handle { cursor: grab; padding: 10px; color: #D2B48C; }
    </style>
</head>
<body>

    <header class="glass-header sticky top-0 z-40 border-b border-[#F5EBE0] px-4 py-4">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center space-x-2">
                <span class="text-2xl">☕</span>
                <span class="tracking-tight">M.Y 靈感收納箱</span>
            </h1>
            <div class="flex items-center space-x-2">
                <!-- 僅保留設定按鈕，讓介面更清爽 -->
                <button onclick="toggleSettings()" class="w-10 h-10 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm active:scale-90 transition-transform">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-6 pb-32">
        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#D2B48C]"></i>
            <input type="text" id="searchInput" oninput="renderItems()" placeholder="搜尋靈感、標籤或內容..." class="w-full pl-11 pr-4 py-3.5 bg-white border border-[#F5EBE0] rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#D2B48C] text-sm">
        </div>

        <div id="tabsContainer" class="flex space-x-3 overflow-x-auto no-scrollbar mb-8 pb-2 px-0.5"></div>

        <div id="itemsGrid" class="masonry-grid"></div>
    </main>

    <button onclick="showAddModal()" class="fixed bottom-8 right-6 w-16 h-16 bg-[#A67B5B] text-white rounded-full shadow-xl flex items-center justify-center text-2xl z-50 hover:scale-105 active:scale-95 transition-all">
        <i class="fas fa-plus"></i>
    </button>

    <!-- 新增靈感 Modal -->
    <div id="addModal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[92vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold flex items-center"><span class="mr-2">✨</span>新增靈感筆記</h2>
                <button onclick="hideAddModal()" class="text-[#D2B48C]"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="space-y-5">
                <div id="imageDropZone" class="w-full h-48 border-2 border-dashed border-[#F5EBE0] rounded-[24px] flex flex-col items-center justify-center bg-[#FAF7F2] overflow-hidden relative group">
                    <div id="previewContainer" class="hidden absolute inset-0 bg-white">
                        <img id="imgPreview" class="w-full h-full object-cover">
                        <button onclick="clearImage()" class="absolute top-3 right-3 bg-black/40 text-white w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-sm">✕</button>
                    </div>
                    <i class="fas fa-camera text-3xl text-[#D2B48C] mb-3"></i>
                    <p class="text-sm text-[#8B7355]">點擊上傳或貼上圖片</p>
                    <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>

                <div class="flex space-x-2">
                    <input id="addTitle" placeholder="標題名稱..." class="flex-1 px-4 py-3.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl focus:outline-none focus:border-[#D2B48C]">
                    <button onclick="aiSuggestTags()" class="px-4 bg-white border border-[#D2B48C] text-[#A67B5B] rounded-2xl text-xs font-bold shadow-sm whitespace-nowrap">✨ AI 標籤</button>
                </div>

                <input id="addTags" placeholder="標籤 (例如: #甜點 #手作)" class="w-full px-4 py-3.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl focus:outline-none text-sm">
                
                <input id="addUrl" placeholder="連結 URL (選填)" class="w-full px-4 py-3.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl focus:outline-none text-sm">

                <div class="space-y-1">
                    <label class="text-xs font-bold text-[#A67B5B] ml-1">選擇分類</label>
                    <select id="addCategory" class="w-full px-4 py-3.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl focus:outline-none appearance-none"></select>
                </div>
                
                <textarea id="addNote" rows="3" placeholder="隨手記錄當下的想法..." class="w-full px-4 py-3.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl focus:outline-none text-sm"></textarea>

                <div class="flex space-x-4 pt-4">
                    <button onclick="saveItem()" class="flex-1 py-4 bg-[#A67B5B] text-white font-bold rounded-[20px] shadow-lg shadow-[#A67B5B]/20">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定 Modal (包含備份功能) -->
    <div id="settingsModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">系統設定</h2>
                <button onclick="toggleSettings()" class="text-[#D2B48C]"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <!-- 分類管理區 -->
            <div class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-[#A67B5B]">分類排序與管理</h3>
                    <button onclick="addCategoryPrompt()" class="text-xs text-[#A67B5B] bg-[#FAF7F2] px-3 py-1 rounded-lg">+ 新增</button>
                </div>
                <div id="categoryOrderList" class="space-y-2 mb-4"></div>
            </div>

            <!-- 資料管理區 (新) -->
            <div class="pt-6 border-t border-[#F5EBE0]">
                <h3 class="text-sm font-bold text-[#A67B5B] mb-4">資料備份與還原</h3>
                <div class="space-y-3">
                    <!-- 匯出 -->
                    <button onclick="exportData()" class="w-full flex items-center p-4 bg-[#FAF7F2] rounded-2xl border border-[#F5EBE0] hover:bg-[#F5EBE0] transition-colors group">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#A67B5B] shadow-sm mr-4">
                            <i class="fas fa-cloud-download-alt"></i>
                        </div>
                        <div class="text-left">
                            <div class="text-sm font-bold">匯出備份檔案</div>
                            <div class="text-[10px] text-[#BDB2A7]">將所有靈感儲存成 JSON 檔</div>
                        </div>
                    </button>
                    <!-- 匯入 -->
                    <button onclick="importData()" class="w-full flex items-center p-4 bg-[#FAF7F2] rounded-2xl border border-[#F5EBE0] hover:bg-[#F5EBE0] transition-colors">
                        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#A67B5B] shadow-sm mr-4">
                            <i class="fas fa-file-import"></i>
                        </div>
                        <div class="text-left">
                            <div class="text-sm font-bold">匯入備份檔案</div>
                            <div class="text-[10px] text-[#BDB2A7]">從舊檔案恢復您的資料</div>
                        </div>
                    </button>
                </div>
            </div>

            <button onclick="toggleSettings()" class="w-full mt-8 py-4 bg-[#A67B5B] text-white font-bold rounded-[20px] shadow-md">完成</button>
        </div>
    </div>

    <script>
        let state = {
            categories: [
                { id: 'cat_1', name: '生活靈感', emoji: '💡' },
                { id: 'cat_2', name: '食譜料理', emoji: '🍳' },
                { id: 'cat_3', name: '育兒親子', emoji: '👶🏻' },
                { id: 'cat_4', name: '手作靈感', emoji: '🧶' }
            ],
            items: [],
            activeTab: 'all',
            tempImage: null
        };

        function init() {
            const saved = localStorage.getItem('my_pocket_pro_v3_1');
            if (saved) state = JSON.parse(saved);
            renderAll();
            setupPasteListener();
        }

        function saveData() {
            localStorage.setItem('my_pocket_pro_v3_1', JSON.stringify(state));
        }

        function renderAll() {
            renderTabs();
            renderItems();
            updateCategorySelect();
            saveData();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            let html = `<button onclick="setTab('all')" class="tab-btn ${state.activeTab === 'all' ? 'active' : ''}">🌟 全部靈感</button>`;
            state.categories.forEach(cat => {
                html += `<button onclick="setTab('${cat.id}')" class="tab-btn ${state.activeTab === cat.id ? 'active' : ''}">${cat.emoji} ${cat.name}</button>`;
            });
            container.innerHTML = html;
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = state.activeTab === 'all' ? state.items : state.items.filter(i => i.catId === state.activeTab);
            if (search) filtered = filtered.filter(i => i.title.toLowerCase().includes(search) || i.tags.toLowerCase().includes(search) || (i.note && i.note.toLowerCase().includes(search)));

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="py-20 text-center opacity-30"><i class="fas fa-coffee text-4xl mb-4"></i><p>這裡目前空空的唷</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const category = state.categories.find(c => c.id === item.catId);
                const tagList = item.tags ? item.tags.split(' ').map(t => `<span class="tag-pill">${t.startsWith('#') ? t : '#'+t}</span>`).join('') : '';
                return `
                <div class="bg-white rounded-[32px] overflow-hidden border border-[#F5EBE0] card-shadow flex flex-col group relative quote-bg mb-2">
                    <button onclick="deleteItem('${item.id}')" class="absolute top-4 right-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full text-red-400 flex items-center justify-center shadow-md z-20"><i class="fas fa-trash-alt text-sm"></i></button>
                    ${item.image ? `<div class="w-full aspect-video bg-[#FAF7F2] overflow-hidden"><img src="${item.image}" class="w-full h-full object-cover"></div>` : ''}
                    <div class="p-6 relative z-10">
                        <div class="flex items-center text-xs text-[#A67B5B] mb-2 font-bold bg-[#FAF7F2] w-fit px-3 py-1 rounded-lg"><span>${category?.emoji} ${category?.name}</span></div>
                        <h3 class="font-bold text-lg text-[#4A3728] leading-tight mb-2">${item.title}</h3>
                        ${item.note ? `<p class="text-sm text-[#8B7355] line-clamp-3 mb-3 leading-relaxed">${item.note}</p>` : ''}
                        <div class="mb-5">${tagList}</div>
                        <div class="flex items-center justify-between pt-4 border-t border-[#FDFBF7]">
                            <span class="text-[11px] text-[#BDB2A7]">${new Date(item.id*1).toLocaleDateString()}</span>
                            ${item.url && item.url !== '#' ? `<a href="${item.url}" target="_blank" class="px-6 py-2.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-2xl text-[#A67B5B] text-xs font-bold shadow-sm active:bg-[#F5EBE0]"><i class="fas fa-external-link-alt mr-2"></i> 前往連結</a>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.saveItem = () => {
            const title = document.getElementById('addTitle').value;
            if (!title) return;
            state.items.unshift({ id: Date.now().toString(), title: title, tags: document.getElementById('addTags').value, url: document.getElementById('addUrl').value || '#', catId: document.getElementById('addCategory').value, note: document.getElementById('addNote').value, image: state.tempImage });
            hideAddModal(); renderAll();
        };

        window.setTab = (id) => { state.activeTab = id; renderAll(); };
        window.showAddModal = () => document.getElementById('addModal').classList.remove('hidden');
        window.hideAddModal = () => { document.getElementById('addModal').classList.add('hidden'); clearImage(); ['addTitle', 'addTags', 'addUrl', 'addNote'].forEach(id => document.getElementById(id).value = ''); };
        window.clearImage = () => { state.tempImage = null; document.getElementById('previewContainer').classList.add('hidden'); };
        window.deleteItem = (id) => { if(confirm('要刪除這筆靈感嗎？')) { state.items = state.items.filter(i => i.id !== id); renderAll(); } };
        window.updateCategorySelect = () => document.getElementById('addCategory').innerHTML = state.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');

        window.toggleSettings = () => {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                const l = document.getElementById('categoryOrderList');
                l.innerHTML = state.categories.map(c => `
                    <div class="flex items-center bg-[#FAF7F2] rounded-2xl border border-[#F5EBE0] overflow-hidden" data-id="${c.id}">
                        <div class="drag-handle px-4"><i class="fas fa-bars opacity-40"></i></div>
                        <span class="flex-1 py-3 text-sm font-medium">${c.emoji} ${c.name}</span>
                        <button onclick="deleteCat('${c.id}')" class="px-4 text-red-300"><i class="fas fa-times"></i></button>
                    </div>`).join('');
                new Sortable(l, { handle: '.drag-handle', animation: 200, onEnd: () => {
                    const ids = Array.from(l.children).map(el => el.dataset.id);
                    state.categories.sort((a,b) => ids.indexOf(a.id) - ids.indexOf(b.id));
                    saveData();
                }});
            } else renderTabs();
        };

        window.addCategoryPrompt = () => {
            const n = prompt("輸入新的分類名稱：");
            const e = prompt("輸入一個代表的 Emoji：", "✨");
            if(n) { state.categories.push({id:'cat_'+Date.now(), name:n, emoji:e || '✨'}); saveData(); toggleSettings(); toggleSettings(); }
        };

        window.deleteCat = id => { 
            if(state.categories.length <= 1) return alert("至少要保留一個分類唷！");
            if(confirm('確定刪除此分類？')) { state.categories = state.categories.filter(c => c.id !== id); saveData(); toggleSettings(); toggleSettings(); } 
        };

        // --- 優化後的備份與匯入功能 ---
        window.exportData = () => {
            const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `M.Y_備份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        window.importData = () => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = re => { 
                    try {
                        const imported = JSON.parse(re.target.result);
                        if(confirm('匯入將會覆蓋目前的資料，確定嗎？')) {
                            state = imported;
                            renderAll();
                            alert("資料恢復成功！");
                            toggleSettings(); // 關閉設定視窗
                        }
                    } catch(err) { alert("檔案格式不正確，請選擇正確的 JSON 備份檔。"); }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        // AI & Image Processing (簡略版，功能同前)
        window.aiSuggestTags = () => {
            const title = document.getElementById('addTitle').value;
            if (!title) return;
            document.getElementById('addTags').value = title.includes('食譜') ? '#懶人料理 #美食' : '#生活 #筆記';
        };

        function setupPasteListener() {
            window.addEventListener('paste', e => {
                if(!document.getElementById('addModal').classList.contains('hidden')) {
                    const items = e.clipboardData.items;
                    for(let i=0; i<items.length; i++) if(items[i].type.indexOf('image')!==-1) processImage(items[i].getAsFile());
                }
            });
            document.getElementById('fileInput').onchange = e => { if(e.target.files[0]) processImage(e.target.files[0]); };
        }

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 1000;
                    if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    state.tempImage = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('imgPreview').src = state.tempImage;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        init();
    </script>
</body>
</html>
