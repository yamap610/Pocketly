<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M.Y 靈感收納箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --cream: #FFFDD0; --latte: #D2B48C; --cocoa: #6F4E37; --bg: #FDFBF7; }
        body { background-color: var(--bg); font-family: -apple-system, "Noto Sans TC", sans-serif; color: var(--cocoa); }
        .glass-header { backdrop-filter: blur(12px); background: rgba(253, 251, 247, 0.8); }
        .card-shadow { box-shadow: 0 4px 20px rgba(210, 180, 140, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 瀑布流 & 列表樣式 */
        .masonry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; transition: all 0.3s ease; }
        .list-view { grid-template-columns: 1fr !important; gap: 12px !important; }
        @media (min-width: 1024px) { .masonry-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }

        /* 引號裝飾 - 加入 pointer-events: none 避免擋住點擊 */
        .quote-bg::before {
            content: "\f10d";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 10px; left: 15px;
            font-size: 2.5rem;
            color: var(--latte);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        
        .tag-pill {
            background: #F5EBE0;
            color: #A67B5B;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            margin-right: 4px;
            margin-bottom: 4px;
            display: inline-block;
        }

        .drop-zone.active { border: 2px dashed var(--latte); background: #FFF9F0; }
    </style>
</head>
<body>

    <header class="glass-header sticky top-0 z-40 border-b border-[#F5EBE0] px-4 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center space-x-2">
                <span class="text-2xl">☕</span>
                <span class="tracking-tight">M.Y 靈感收納箱</span>
            </h1>
            <div class="flex items-center space-x-2">
                <!-- 視角切換按鈕 -->
                <button onclick="toggleViewMode()" id="viewModeBtn" class="w-9 h-9 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm mr-2">
                    <i class="fas fa-th-large"></i>
                </button>
                <button onclick="exportData()" class="w-9 h-9 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm">
                    <i class="fas fa-cloud-download-alt"></i>
                </button>
                <button onclick="importData()" class="w-9 h-9 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm">
                    <i class="fas fa-file-import"></i>
                </button>
                <button onclick="toggleSettings()" class="w-9 h-9 rounded-full bg-white border border-[#F5EBE0] text-[#A67B5B] flex items-center justify-center shadow-sm">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 pb-32">
        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#D2B48C]"></i>
            <input type="text" id="searchInput" oninput="renderItems()" placeholder="搜尋靈感或標籤..." class="w-full pl-11 pr-4 py-3 bg-white border border-[#F5EBE0] rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#D2B48C]">
        </div>

        <div id="tabsContainer" class="flex space-x-2 overflow-x-auto no-scrollbar mb-8 pb-1"></div>

        <div id="itemsGrid" class="masonry-grid">
            <!-- 由 JS 渲染 -->
        </div>
    </main>

    <button onclick="showAddModal()" class="fixed bottom-8 right-6 w-14 h-14 bg-[#A67B5B] text-white rounded-full shadow-lg flex items-center justify-center text-2xl z-50 hover:scale-105 transition-transform">
        <i class="fas fa-plus"></i>
    </button>

    <!-- 新增靈感 Modal -->
    <div id="addModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-6 flex items-center">✨ 新增靈感</h2>
            
            <div class="space-y-4">
                <div id="imageDropZone" class="drop-zone w-full h-40 border-2 border-dashed border-[#F5EBE0] rounded-2xl flex flex-col items-center justify-center bg-[#FAF7F2] overflow-hidden relative group">
                    <div id="previewContainer" class="hidden absolute inset-0 bg-white">
                        <img id="imgPreview" class="w-full h-full object-cover">
                        <button onclick="clearImage()" class="absolute top-2 right-2 bg-black/50 text-white w-6 h-6 rounded-full text-xs">✕</button>
                    </div>
                    <i class="fas fa-image text-3xl text-[#D2B48C] mb-2"></i>
                    <p class="text-xs text-[#8B7355]">點擊上傳或「直接貼上截圖」</p>
                    <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>

                <div class="flex space-x-2">
                    <input id="addTitle" placeholder="給這個靈感一個標題..." class="flex-1 px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none">
                    <button onclick="aiSuggestTags()" class="px-3 bg-[#FDFBF7] border border-[#D2B48C] text-[#A67B5B] rounded-xl text-xs font-bold">✨ AI 幫貼標籤</button>
                </div>

                <input id="addTags" placeholder="標籤 (例如: #甜點 #食譜)" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none text-sm">
                
                <input id="addUrl" placeholder="連結 (可留空)" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none text-sm">

                <select id="addCategory" class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none"></select>
                
                <textarea id="addNote" rows="2" placeholder="寫下妳的隨手筆記..." class="w-full px-4 py-3 bg-[#FAF7F2] border border-[#F5EBE0] rounded-xl focus:outline-none text-sm"></textarea>

                <div class="flex space-x-3 pt-2">
                    <button onclick="hideAddModal()" class="flex-1 py-3 text-[#8B7355] font-medium">取消</button>
                    <button onclick="saveItem()" class="flex-1 py-3 bg-[#A67B5B] text-white font-bold rounded-2xl shadow-md">儲存靈感</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理分類 Modal -->
    <div id="settingsModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">自訂分類排序</h2>
                <button onclick="addCategoryPrompt()" class="text-[#A67B5B] text-sm">+ 新增</button>
            </div>
            <div id="categoryOrderList" class="space-y-2 mb-6 max-h-80 overflow-y-auto pr-1"></div>
            <button onclick="toggleSettings()" class="w-full py-3 bg-[#A67B5B] text-white font-bold rounded-2xl">完成</button>
        </div>
    </div>

    <script>
        let state = {
            categories: [
                { id: 'cat_1', name: '生活靈感', emoji: '💡' },
                { id: 'cat_2', name: '食譜料理', emoji: '🍳' },
                { id: 'cat_3', name: '育兒親子', emoji: '👶🏻' },
                { id: 'cat_4', name: '手作靈感', emoji: '🧶' },
                { id: 'cat_5', name: '旅遊相關', emoji: '✈️' },
                { id: 'cat_6', name: '網友推薦', emoji: '🛍️' },
                { id: 'cat_7', name: '書籍收藏', emoji: '📚' },
                { id: 'cat_8', name: '美食地圖', emoji: '🍰' }
            ],
            items: [],
            activeTab: 'all',
            viewMode: 'grid', // 'grid' or 'list'
            tempImage: null
        };

        function init() {
            const saved = localStorage.getItem('my_pocket_pro_v2');
            if (saved) state = JSON.parse(saved);
            renderAll();
            setupPasteListener();
        }

        function saveData() {
            localStorage.setItem('my_pocket_pro_v2', JSON.stringify(state));
        }

        function renderAll() {
            renderTabs();
            renderItems();
            updateCategorySelect();
            saveData();
        }

        function toggleViewMode() {
            state.viewMode = state.viewMode === 'grid' ? 'list' : 'grid';
            const btn = document.getElementById('viewModeBtn');
            btn.innerHTML = state.viewMode === 'grid' ? '<i class="fas fa-th-large"></i>' : '<i class="fas fa-list"></i>';
            renderItems();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            let html = `<button onclick="setTab('all')" class="flex-shrink-0 px-5 py-2 rounded-full border transition-all ${state.activeTab === 'all' ? 'bg-[#A67B5B] text-white border-[#A67B5B]' : 'bg-white text-[#6F4E37] border-[#D2B48C]'} shadow-sm">🌟 全部</button>`;
            state.categories.forEach(cat => {
                html += `<button onclick="setTab('${cat.id}')" class="flex-shrink-0 px-5 py-2 rounded-full border transition-all ${state.activeTab === cat.id ? 'bg-[#A67B5B] text-white border-[#A67B5B]' : 'bg-white text-[#6F4E37] border-[#D2B48C]'} shadow-sm">${cat.emoji} ${cat.name}</button>`;
            });
            container.innerHTML = html;
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            if (state.viewMode === 'list') grid.classList.add('list-view');
            else grid.classList.remove('list-view');

            let filtered = state.activeTab === 'all' ? state.items : state.items.filter(i => i.catId === state.activeTab);
            if (search) {
                filtered = filtered.filter(i => i.title.toLowerCase().includes(search) || i.tags.toLowerCase().includes(search));
            }

            grid.innerHTML = filtered.map(item => {
                const category = state.categories.find(c => c.id === item.catId);
                const tagList = item.tags ? item.tags.split(' ').map(t => `<span class="tag-pill">${t.startsWith('#') ? t : '#'+t}</span>`).join('') : '';
                
                return `
                <div class="bg-white rounded-[24px] overflow-hidden border border-[#F5EBE0] card-shadow flex ${state.viewMode === 'list' ? 'flex-row h-32' : 'flex-col'} group relative quote-bg">
                    <!-- 修正刪除按鈕層級 z-20 -->
                    <button onclick="deleteItem('${item.id}')" class="absolute top-2 right-2 w-7 h-7 bg-white/90 backdrop-blur rounded-full text-red-400 opacity-0 group-hover:opacity-100 transition-opacity z-20 flex items-center justify-center shadow-sm">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                    
                    <!-- 圖片區 -->
                    <div class="${state.viewMode === 'list' ? 'w-32 h-full' : 'w-full aspect-[4/5]'} bg-[#FAF7F2] overflow-hidden">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-3xl opacity-20">${category?.emoji || '📝'}</div>`}
                    </div>

                    <!-- 內容區 -->
                    <div class="p-4 flex-1 flex flex-col justify-between relative z-10">
                        <div>
                            <div class="flex items-center text-[10px] text-[#A67B5B] mb-1 font-bold">
                                <span>${category?.emoji} ${category?.name}</span>
                            </div>
                            <h3 class="font-bold text-sm text-[#4A3728] line-clamp-2 mb-1">${item.title}</h3>
                            <div class="mt-1">${tagList}</div>
                        </div>
                        
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-[10px] text-[#BDB2A7]">${new Date(item.id*1).toLocaleDateString()}</span>
                            <a href="${item.url}" target="_blank" class="px-4 py-1.5 bg-[#FAF7F2] border border-[#F5EBE0] rounded-full text-[#A67B5B] text-[10px] font-bold hover:bg-[#F5EBE0]">
                                <i class="fas fa-link mr-1"></i> 前往原文
                            </a>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // AI 標籤助理優化
        window.aiSuggestTags = () => {
            const title = document.getElementById('addTitle').value;
            const tagInput = document.getElementById('addTags');
            if (!title) return alert("請先輸入標題唷！");
            
            const keywords = {
                '食譜': ['#懶人料理', '#手作便當', '#美食'],
                '育兒': ['#育兒好物', '#寶寶成長', '#媽媽日常'],
                '靈感': ['#日系美學', '#生活雜記'],
                '甜點': ['#下午茶', '#烘焙', '#甜點控']
            };
            
            let tags = ["#靈感"];
            for (let k in keywords) {
                if (title.includes(k)) tags = [...tags, ...keywords[k]];
            }
            
            tagInput.value = tags.join(" ");
            tagInput.focus();
        };

        function setupPasteListener() {
            window.addEventListener('paste', (e) => {
                if (!document.getElementById('addModal').classList.contains('hidden')) {
                    const items = e.clipboardData.items;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) processImage(items[i].getAsFile());
                    }
                }
            });
            document.getElementById('fileInput').onchange = (e) => { if (e.target.files[0]) processImage(e.target.files[0]); };
        }

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 800;
                    if (w > h && w > max) { h *= max/w; w = max; }
                    else if (h > max) { w *= max/h; h = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    state.tempImage = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('imgPreview').src = state.tempImage;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.saveItem = () => {
            const title = document.getElementById('addTitle').value;
            if (!title) return alert("標題不能空白唷！");
            state.items.unshift({
                id: Date.now().toString(),
                title: title,
                tags: document.getElementById('addTags').value,
                url: document.getElementById('addUrl').value || '#',
                catId: document.getElementById('addCategory').value,
                note: document.getElementById('addNote').value,
                image: state.tempImage
            });
            hideAddModal();
            renderAll();
        };

        // 其它功能
        window.setTab = (id) => { state.activeTab = id; renderAll(); };
        window.showAddModal = () => document.getElementById('addModal').classList.remove('hidden');
        window.hideAddModal = () => { 
            document.getElementById('addModal').classList.add('hidden'); 
            clearImage(); 
            ['addTitle', 'addTags', 'addUrl', 'addNote'].forEach(id => document.getElementById(id).value = '');
        };
        window.clearImage = () => { state.tempImage = null; document.getElementById('previewContainer').classList.add('hidden'); };
        
        // 刪除函數優化：確保重新渲染
        window.deleteItem = (id) => { 
            if(confirm('要刪除這筆靈感嗎？')) { 
                state.items = state.items.filter(i => i.id !== id); 
                renderAll(); 
            } 
        };

        window.updateCategorySelect = () => {
            document.getElementById('addCategory').innerHTML = state.categories.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
        };
        window.toggleSettings = () => {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                const l = document.getElementById('categoryOrderList');
                l.innerHTML = state.categories.map(c => `<div class="flex items-center justify-between bg-[#FAF7F2] p-3 rounded-xl border border-[#F5EBE0] cursor-move" data-id="${c.id}"><span class="text-sm">${c.emoji} ${c.name}</span><button onclick="deleteCat('${c.id}')" class="text-red-300">✕</button></div>`).join('');
                new Sortable(l, { animation:150, onEnd: () => {
                    const ids = Array.from(l.children).map(el => el.dataset.id);
                    state.categories.sort((a,b) => ids.indexOf(a.id) - ids.indexOf(b.id));
                    saveData();
                }});
            } else renderTabs();
        };
        window.exportData = () => {
            const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `MY_Pocket_v2_${new Date().toLocaleDateString()}.json`;
            a.click();
        };
        window.importData = () => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = re => { state = JSON.parse(re.target.result); renderAll(); alert("匯入成功！"); };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };
        window.addCategoryPrompt = () => {
            const n = prompt("分類名稱？"), e = prompt("Emoji？", "✨");
            if(n) { state.categories.push({id:'cat_'+Date.now(), name:n, emoji:e}); renderAll(); toggleSettings(); toggleSettings(); }
        };
        window.deleteCat = id => { if(confirm('確定刪除分類？')) { state.categories = state.categories.filter(c => c.id !== id); renderAll(); toggleSettings(); toggleSettings(); } };

        init();
    </script>
</body>
</html>
